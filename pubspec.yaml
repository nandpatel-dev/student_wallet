name: student_app
description: "A new Flutter project for student history."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  provider: ^6.1.2
  open_filex: ^4.5.1
  path_provider: ^2.1.5
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2
  app_links: ^6.3.2
  intl: ^0.20.2
  mobile_scanner: ^6.0.4
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
